<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>

    <style>
        /* Page Styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
            background-color: #f4f4f4;
        }

        /* Navigation Menu */
        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        nav a:hover {
            color: orange;
        }

        /* Content Section */
        .container {
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin: 20px 0;
        }

        /* Form Styling */
        form {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            width: 220px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Heading, Paragraph, and Image -->
    <div class="container">
        <h1>Welcome to My Webpage</h1>

        <p>
            This is a simple webpage created using HTML and CSS.
        </p>

        <img src="https://via.placeholder.com/300"
             alt="Sample Image">

        <!-- Basic Form -->
        <form>
            <input type="text" placeholder="Enter your name">
            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
